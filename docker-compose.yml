services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tehtek_erp_api
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: unless-stopped
    expose:
      - "8000"

  db:
    image: postgres:16
    container_name: tehtek_erp_db
    environment:
      POSTGRES_DB: tehtek_erp
      POSTGRES_USER: tehtek
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: tehtek_erp_caddy
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config: