  services:
  api:
    build: .
    container_name: tehtek_api
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "8000:8000"

  db:
    image: postgres:16
    container_name: tehtek_db
    environment:
      POSTGRES_DB: tehtek
      POSTGRES_USER: tehtek
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: