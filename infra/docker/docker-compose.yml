services:
  frontend:
    build:
      context: ../../frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.tehtek.com
    container_name: tehtek_frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://api.tehtek.com

  backend:
    build:
      context: ../../backend
    container_name: tehtek_backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ../../backend/.env

  caddy:
    image: caddy:latest
    container_name: tehtek_caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: