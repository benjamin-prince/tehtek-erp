services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: tehtek_api
    env_file:
      - ../../backend/.env
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: tehtek_frontend
    env_file:
      - ../../frontend/.env.local
    expose:
      - "3000"
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: tehtek_db
    environment:
      POSTGRES_DB: tehtek_erp
      POSTGRES_USER: tehtek
      POSTGRES_PASSWORD: tehtek_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: tehtek_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config: