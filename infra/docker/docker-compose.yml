services:
  frontend:
    build:
      context: ./frontend
    container_name: tehtek_frontend
    restart: unless-stopped
    expose:
      - "3000"

  backend:
    build:
      context: ./backend
    container_name: tehtek_backend
    restart: unless-stopped
    expose:
      - "8000"

  caddy:
    image: caddy:latest
    container_name: tehtek_caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config: